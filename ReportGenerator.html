<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RB Solutions - Report Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col items-center p-8">

    <!-- Header -->
    <div class="w-full max-w-4xl flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Report Generator</h1>
            <p class="text-slate-500 text-sm">Convert Gemini code into a client PDF.</p>
        </div>
        <a href="staff.html" class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Portal
        </a>
    </div>

    <!-- Main Tool -->
    <div
        class="w-full max-w-4xl bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200 flex flex-col md:flex-row h-[600px]">

        <!-- Input Side -->
        <div class="p-6 md:w-1/2 flex flex-col border-r border-slate-100">
            <label class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                <span
                    class="flex items-center justify-center w-5 h-5 rounded-full bg-blue-100 text-blue-600 text-xs">1</span>
                Paste Code Here
            </label>
            <textarea id="codeData"
                class="flex-1 w-full p-4 bg-slate-50 border border-slate-200 rounded-lg font-mono text-xs resize-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                placeholder='Paste the HTML code from Gemini here...'></textarea>
        </div>

        <!-- Action Side -->
        <div class="p-6 md:w-1/2 bg-slate-50 flex flex-col justify-center items-center text-center">
            <div class="mb-6 p-4 bg-white rounded-lg border border-slate-200 shadow-sm max-w-xs">
                <p class="text-slate-600 text-sm mb-1">Ready to create?</p>
                <p class="text-xs text-slate-400">This will open a new tab where you can save as PDF.</p>
            </div>

            <button onclick="generateReport()"
                class="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-blue-900 font-lg rounded-xl hover:bg-blue-800 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-900">
                <span class="mr-2">Create Report & Print</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        function generateReport() {
            const rawCode = document.getElementById('codeData').value;

            if (!rawCode.trim()) {
                alert("Please paste the code from Gemini first!");
                return;
            }

            // Open a new window
            const newWindow = window.open('', '_blank');

            // Write the pasted code into the new window
            newWindow.document.open();
            newWindow.document.write(rawCode);
            newWindow.document.close();

            // Note: The report code itself handles the "Print" button logic
        }
    </script>
</body>

</html>
